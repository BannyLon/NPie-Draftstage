<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Obsidian 孤岛笔记 — 嗯哌AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f3f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .scene {
    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(108,49,227,0.06);
    background: linear-gradient(135deg, #f8f6fc 0%, #ede9fe 30%, #e4def7 60%, #ddd6fe 100%);
    background-size: cover;
  }
  canvas#graph {
    width: 100%;
    height: 100%;
    display: block;
  }
  #rec-status {
    position: absolute;
    top: 32px; left: 40px;
    z-index: 10;
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(60,40,90,0.6);
    letter-spacing: 0.08em;
    font-family: inherit;
  }
  #rec-status.show { display: flex; }
  #rec-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ef4444;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.15; }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <canvas id="graph"></canvas>
  <div id="rec-status">
    <span id="rec-dot"></span>
    <span id="rec-timer">00:00</span>
  </div>
</div>

<script>
// ── Rendering on canvas ──
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W;
canvas.height = H;

let time = 0;
const CENTER = { x: W * 0.50, y: H * 0.50 };
const CLUSTER_NODES = 38;
const ISLAND_NODES = 16;
const nodes = [];
const links = [];

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// Connected cluster
const clusterNodes = [];
const radius = Math.min(W, H) * 0.18;
for (let i = 0; i < CLUSTER_NODES; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = radius * (0.2 + Math.random() * 0.8);
  clusterNodes.push({
    x: CENTER.x + Math.cos(angle) * r,
    y: CENTER.y + Math.sin(angle) * r * 0.85,
    vx: 0, vy: 0, radius: 2.5 + Math.random() * 3.5,
    linked: true, alpha: 0.35 + Math.random() * 0.3,
    phase: Math.random() * Math.PI * 2, pulseSpeed: 0.3 + Math.random() * 0.5,
  });
}
nodes.push(...clusterNodes);

for (let i = 0; i < clusterNodes.length; i++) {
  const others = clusterNodes
    .map((n, idx) => ({ node: n, idx, d: dist(clusterNodes[i], n) }))
    .filter(item => item.idx !== i)
    .sort((a, b) => a.d - b.d);
  const k = 2 + Math.floor(Math.random() * 3);
  for (let j = 0; j < Math.min(k, others.length); j++) {
    if (dist(clusterNodes[i], others[j].node) < radius * 1.1) {
      links.push({ source: i, target: others[j].idx, alpha: 0.08 + Math.random() * 0.15, phase: Math.random() * Math.PI * 2 });
    }
  }
}

const isoPositions = [
  { x: W * 0.88, y: H * 0.10 }, { x: W * 0.92, y: H * 0.35 },
  { x: W * 0.85, y: H * 0.62 }, { x: W * 0.90, y: H * 0.82 },
  { x: W * 0.08, y: H * 0.88 }, { x: W * 0.04, y: H * 0.25 },
  { x: W * 0.12, y: H * 0.08 }, { x: W * 0.65, y: H * 0.92 },
  { x: W * 0.75, y: H * 0.04 }, { x: W * 0.38, y: H * 0.04 },
  { x: W * 0.55, y: H * 0.92 }, { x: W * 0.25, y: H * 0.92 },
  { x: W * 0.70, y: H * 0.55 }, { x: W * 0.20, y: H * 0.15 },
  { x: W * 0.93, y: H * 0.55 }, { x: W * 0.70, y: H * 0.78 },
];
for (let i = 0; i < ISLAND_NODES; i++) {
  const p = isoPositions[i];
  nodes.push({
    x: p.x, y: p.y, vx: 0, vy: 0, radius: 3.5 + Math.random() * 3,
    linked: false, alpha: 0.15 + Math.random() * 0.18,
    phase: Math.PI * 2 * (i / ISLAND_NODES), pulseSpeed: 0.2 + Math.random() * 0.4,
  });
}

// Text animation timing
const TEXT_START = 0.3; // seconds after recording start

function drawText(t) {
  const W = canvas.width, H = canvas.height;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // Label
  let labelAlpha = 0, labelY = H * 0.355;
  if (t >= TEXT_START + 0.0) {
    const p = Math.min((t - TEXT_START - 0.0) / 0.6, 1);
    labelAlpha = easeOutCubic(p);
    labelY = H * 0.355 + (1 - easeOutCubic(p)) * 16;
  }

  if (labelAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.fillStyle = 'rgba(108,49,227,0.5)';
    ctx.font = '600 18px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('嗯哌 AI · Obsidian 诊断', W / 2, labelY);
    ctx.restore();
  }

  // Main hook — "你的知识库里" (line 1)
  let h1Alpha = 0, h1Y = H * 0.42;
  if (t >= TEXT_START + 0.3) {
    const p = Math.min((t - TEXT_START - 0.3) / 0.6, 1);
    h1Alpha = easeOutCubic(p);
    h1Y = H * 0.42 + (1 - easeOutCubic(p)) * 16;
  }

  if (h1Alpha > 0) {
    ctx.save();
    ctx.globalAlpha = h1Alpha;
    ctx.fillStyle = '#2d1b4e';
    ctx.font = 'bold 52px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('你的知识库里', W / 2, h1Y);
    ctx.restore();
  }

  // Main hook — "有多少笔记是" (line 2 start)
  let h2Alpha = 0, h2Y = H * 0.42 + 62;
  if (t >= TEXT_START + 0.6) {
    const p = Math.min((t - TEXT_START - 0.6) / 0.6, 1);
    h2Alpha = easeOutCubic(p);
    h2Y = H * 0.42 + 62 + (1 - easeOutCubic(p)) * 16;
  }

  if (h2Alpha > 0) {
    ctx.save();
    ctx.globalAlpha = h2Alpha;
    ctx.fillStyle = '#2d1b4e';
    ctx.font = 'bold 52px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('有多少笔记是', W / 2 - 110, h2Y);
    ctx.restore();
  }

  // "「孤岛」" — highlighted
  let highlightAlpha = 0, hlY = h2Y;
  if (t >= TEXT_START + 0.6) {
    const p = Math.min((t - TEXT_START - 0.6) / 0.6, 1);
    highlightAlpha = easeOutCubic(p);
    hlY = h2Y;
  }
  if (highlightAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = highlightAlpha;
    ctx.fillStyle = '#6C31E3';
    ctx.font = 'bold 58px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('「孤岛」', W / 2 + 170, hlY);
    ctx.restore();

    // Underline effect
    ctx.save();
    ctx.globalAlpha = highlightAlpha * 0.7;
    const underlineY = hlY + 6;
    const grad = ctx.createLinearGradient(W / 2 + 20, 0, W / 2 + 230, 0);
    grad.addColorStop(0, '#6C31E3');
    grad.addColorStop(0.7, '#6C31E3');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W / 2 + 30, underlineY);
    ctx.lineTo(W / 2 + 220, underlineY);
    ctx.stroke();
    ctx.restore();
  }

  // Subtitle
  let subAlpha = 0, subY = H * 0.62;
  if (t >= TEXT_START + 0.9) {
    const p = Math.min((t - TEXT_START - 0.9) / 0.6, 1);
    subAlpha = easeOutCubic(p);
    subY = H * 0.62 + (1 - easeOutCubic(p)) * 14;
  }
  if (subAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = subAlpha;
    ctx.fillStyle = 'rgba(60,40,90,0.5)';
    ctx.font = '400 20px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('当一个仓库的链接密度归零、命名开始冲突、', W / 2, subY);
    ctx.fillText('内容彼此矛盾 —— 你需要的不是更多笔记，而是一个外部视角。', W / 2, subY + 32);
    ctx.restore();
  }

  // Brand watermark
  {
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = 'rgba(108,49,227,1)';
    ctx.font = '500 12px system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('嗯哌 AI', W - 40, 32);
    ctx.restore();
  }

  // Badge label
  {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = 'rgba(108,49,227,1)';
    ctx.font = '400 11px system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('总笔记数', W - 40, 130);
    ctx.restore();
  }
}

function drawScene() {
  const W = canvas.width, H = canvas.height;

  // ── Background gradient ──
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#f8f6fc');
  bg.addColorStop(0.3, '#ede9fe');
  bg.addColorStop(0.6, '#e4def7');
  bg.addColorStop(1, '#ddd6fe');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Grid ──
  ctx.save();
  ctx.strokeStyle = 'rgba(108,49,227,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // ── Vignette ──
  const vig = ctx.createRadialGradient(W/2, H*0.48, H*0.25, W/2, H*0.48, H*0.8);
  vig.addColorStop(0, 'rgba(200,185,230,0)');
  vig.addColorStop(1, 'rgba(200,185,230,0.25)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // ── Ambient glow ──
  const glow1 = ctx.createRadialGradient(W * 0.85, H * 0.75, 0, W * 0.85, H * 0.75, 350);
  glow1.addColorStop(0, 'rgba(108,49,227,0.06)');
  glow1.addColorStop(1, 'rgba(108,49,227,0)');
  ctx.fillStyle = glow1;
  ctx.fillRect(0, 0, W, H);

  const glow2 = ctx.createRadialGradient(W * 0.15, H * 0.25, 0, W * 0.15, H * 0.25, 250);
  glow2.addColorStop(0, 'rgba(108,49,227,0.04)');
  glow2.addColorStop(1, 'rgba(108,49,227,0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, W, H);

  // ── Animate nodes ──
  nodes.forEach((n) => {
    n.vx += Math.sin(time * n.pulseSpeed + n.phase) * 0.0015;
    n.vy += Math.cos(time * n.pulseSpeed * 0.7 + n.phase * 1.3) * 0.0015;
    n.vx *= 0.98; n.vy *= 0.98;
    n.x += n.vx; n.y += n.vy;
    if (n.x < 10) n.vx += 0.05;
    if (n.x > W - 10) n.vx -= 0.05;
    if (n.y < 10) n.vy += 0.05;
    if (n.y > H - 10) n.vy -= 0.05;
  });

  // ── Draw links ──
  links.forEach(lk => {
    const s = nodes[lk.source], t = nodes[lk.target];
    const pulse = 0.7 + 0.3 * Math.sin(time * 1.2 + lk.phase);
    const a = lk.alpha * pulse;
    ctx.save();
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = `rgba(108,49,227,${a})`;
    ctx.lineWidth = 0.4; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = `rgba(108,49,227,${a * 0.15})`;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  });

  // ── Draw nodes ──
  nodes.forEach(n => {
    const pulse = 0.8 + 0.2 * Math.sin(time * n.pulseSpeed + n.phase);
    const r = n.radius * pulse;
    const baseAlpha = n.alpha * (n.linked ? 1 : 0.6);

    if (n.linked) {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 4);
      g.addColorStop(0, `rgba(108,49,227,${0.06 * pulse})`);
      g.addColorStop(1, 'rgba(108,49,227,0)');
      ctx.save();
      ctx.beginPath(); ctx.arc(n.x, n.y, r * 4, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    if (n.linked) {
      ctx.fillStyle = `rgba(108,49,227,${baseAlpha * 0.8})`;
      ctx.shadowColor = 'rgba(108,49,227,0.15)';
      ctx.shadowBlur = 4; ctx.fill(); ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(n.x - r * 0.25, n.y - r * 0.25, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.12 * pulse})`;
      ctx.fill();
    } else {
      ctx.fillStyle = `rgba(160,150,175,${baseAlpha * 0.45})`;
      ctx.fill();
      ctx.beginPath(); ctx.arc(n.x, n.y, r * 2, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(160,150,175,${0.05 * pulse})`;
      ctx.lineWidth = 0.4; ctx.stroke();
    }
    ctx.restore();
  });

  // ── Badge number ──
  {
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = 'rgba(108,49,227,1)';
    ctx.font = '200 52px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    const flicker = Math.sin(time * 0.5) * 0.3;
    ctx.fillText(`${Math.round(100 + flicker)}`, W - 40, 80);
    ctx.restore();
  }

  // ── Text overlay ──
  drawText(time);
}

// ── Animation loop ──
function animate() {
  time += 0.006;
  drawScene();
  requestAnimationFrame(animate);
}
animate();

// ====== RECORDING LOGIC ======
const params = new URLSearchParams(location.search);
if (params.get('record') === '1') {
  const RECORD_DURATION = 30;
  const FPS = 30;
  const recStatus = document.getElementById('rec-status');
  const recTimer = document.getElementById('rec-timer');
  recStatus.classList.add('show');

  const stream = canvas.captureStream(FPS);
  const mr = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp9',
    videoBitsPerSecond: 20_000_000,
  });

  const chunks = [];
  mr.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = async () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const fd = new FormData();
    fd.append('video', blob, 'obsidian-islands.webm');
    try {
      await fetch('/save-video', { method: 'POST', body: fd });
      recTimer.textContent = '✓ SENT';
    } catch(e) {
      recTimer.textContent = '✗ FAIL';
      // Fallback: trigger download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'obsidian-islands.webm';
      a.click();
    }
  };

  mr.start(1000 / FPS);
  const startTime = performance.now();

  function tick() {
    const elapsed = (performance.now() - startTime) / 1000;
    if (elapsed < RECORD_DURATION) {
      const secs = Math.floor(elapsed);
      recTimer.textContent = `${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
      requestAnimationFrame(tick);
    } else {
      recTimer.textContent = '30:00';
      mr.stop();
    }
  }
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
