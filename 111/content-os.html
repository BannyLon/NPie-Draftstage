<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPie Draftstage · 哌稿场档期</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="CSS/content-os.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-panel">
      <div class="main-header">
        <div class="header-ticker" id="header-ticker"></div>
        <div class="main-header-brand">
          <img class="main-header-logo" src="IMG/NPIEAI_logo.jpg" alt="NPIE" />
          <span class="main-header-title">哌稿场 · 档期<br><small>NPie Draftstage</small></span>
        </div>
      </div>
      <div class="panel-section" id="timeline-section" style="padding:0;">
        <div class="timeline-hero">
          <div class="timeline-hero-eyebrow">DRAG TO SCHEDULE</div>
          <div class="timeline-hero-title">选题和日历，同屏排期</div>
          <div class="timeline-hero-desc">拖左侧选题卡 → 重新按工作日倒排。拖右侧任务块 → 仅移动该节点。排期自动避开周末与法定节假日。时间轴从 7 月延伸到 12 月，随选题扩展。</div>
        </div>
        <div style="border: 1px solid var(--border); border-radius: 14px; margin: 0 16px 24px; overflow: hidden; background: var(--surface);">
          <div class="timeline-scroll" id="timeline-scroll">
            <div class="timeline-inner" id="timeline-inner"></div>
          </div>
          <div class="add-topic-bar">
            <button class="add-topic-btn" id="btn-add-topic">+ 增加选题</button>
          </div>
        </div>
      </div>
      <div class="panel-section panel-section-topics" id="topics-section">
        <div class="section-card">
          <div class="topics-title-area">
            <div class="topics-title-large">选题卡</div>
            <div class="topics-title-small">前置准备可以自由增加、勾选和删除。正式流程保持统一，避免每条内容出现一套不同的复杂清单。</div>
          </div>
          <div class="cards-wrap">
            <div class="cards-grid" id="cards-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">新增选题</div>
      <div class="modal-field">
        <label>选题名称</label>
        <input type="text" id="modal-title" placeholder="如 DJI Mic Mini 2s" />
      </div>
      <div class="modal-field">
        <label>工作流类型</label>
        <select id="modal-type">
          <option value="self">自制内容</option>
          <option value="commercial">商单</option>
        </select>
      </div>
      <div class="modal-field">
        <label>发布日期</label>
        <input type="date" id="modal-date" />
      </div>
      <div class="modal-field">
        <label>状态</label>
        <select id="modal-status">
          <option value="normal">普通</option>
          <option value="important">重要</option>
          <option value="urgent">紧急</option>
        </select>
      </div>
      <div class="modal-field">
        <label>影响力</label>
        <div class="star-rating" id="modal-priority">
          <span data-star="1">☆</span><span data-star="2">☆</span><span data-star="3">☆</span><span data-star="4">☆</span><span data-star="5">☆</span>
        </div>
        <input type="hidden" id="modal-priority-val" value="0" />
      </div>
      <div class="modal-field" id="modal-budget-field" style="display:none;">
        <label>金额</label>
        <input type="text" id="modal-budget" placeholder="如 ¥50,000" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="modal-confirm">确认添加</button>
      </div>
    </div>
  </div>

  <!-- 右键菜单 -->
  <div id="ctx-menu" class="ctx-menu" style="display:none"></div>

  <!-- 新增日程弹窗 -->
  <div class="modal-overlay" id="schedule-modal-overlay">
    <div class="modal-box">
      <div class="modal-title">新增日程</div>
      <div class="modal-field">
        <label>日程名称</label>
        <input type="text" id="schedule-modal-name" placeholder="如 品牌素材整理" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="schedule-modal-cancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="schedule-modal-confirm">确认添加</button>
      </div>
    </div>
  </div>

  <!-- Obsidian 链接弹窗 -->
  <div class="modal-overlay" id="obsidian-modal-overlay">
    <div class="modal-box" style="width:580px;max-width:96vw;">
      <div class="modal-title">设置 Obsidian 笔记链接</div>
      <div class="modal-field">
        <label>obsidian://open?vault=你的Vault名&file=笔记路径或标题</label>
        <input type="text" id="obsidian-modal-input" placeholder="obsidian://open?vault=我的Vault&file=选题/笔记名" style="font-size:0.78rem;" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="obsidian-modal-cancel">取消</button>
        <button class="modal-btn modal-btn-cancel" id="obsidian-modal-clear" style="color:var(--red)">清除链接</button>
        <button class="modal-btn modal-btn-primary" id="obsidian-modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- 重命名弹窗 -->
  <div class="modal-overlay" id="rename-modal-overlay">
    <div class="modal-box">
      <div class="modal-title">重命名选题</div>
      <div class="modal-field">
        <label>选题名称</label>
        <input type="text" id="rename-modal-input" placeholder="新名称" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="rename-modal-cancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="rename-modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <input type="file" id="import-file" accept="application/json" hidden />
  <div id="toast"></div>

  <script src="JS/content-os.js"></script>
</body>
</html>
