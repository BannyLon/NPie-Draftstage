<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTENT OS — 内容项目管理看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Poppins', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      --bg: #F4EFE6;
      --surface: #FFFFFF;
      --surface-muted: #FCF7EE;
      --border: #D9D1C5;
      --text: #2C2A29;
      --text-muted: #6F655F;
      --muted-2: #A69B91;
      --accent: #B08A53;
      --accent-soft: #E8D8BC;
      --green: #8B9B7A;
      --red: #A46858;
      --blue: #7C8E99;
      --yellow: #C6A25C;
      --shadow: 0 12px 32px rgba(44, 42, 41, 0.06);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
    button, input, select { font: inherit; }
    .app-shell { min-height: 100vh; display: flex; }
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-top { padding: 20px 16px 12px; }
    .brand-title {
      letter-spacing: 0.14em; text-transform: uppercase;
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      margin-bottom: 4px;
    }
    .brand-subtitle {
      font-size: 1.18rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .nav-list { padding: 10px 14px 0; display: flex; flex-direction: column; gap: 2px; }
    .nav-pill {
      display: block; width: 100%; text-align: left;
      padding: 10px 14px; border-radius: 10px;
      border: none; background: transparent;
      color: var(--text); font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .nav-pill:hover { background: rgba(216,203,180,0.25); }
    .nav-pill.active {
      background: rgba(216,203,180,0.45);
      font-weight: 700;
    }
    .sidebar-divider {
      height: 1px; background: var(--border);
      margin: 12px 14px 0;
    }
    .sidebar-section-label {
      padding: 10px 14px 6px;
      font-size: 0.68rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.06em;
    }
    .topic-list {
      flex: 0 0 auto;
      overflow-y: auto;
      overflow-x: hidden;
      max-height: calc(100vh - 280px);
      padding: 0 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .topic-list::-webkit-scrollbar { width: 4px; }
    .topic-list::-webkit-scrollbar-thumb { background: rgba(44,42,41,0.12); border-radius: 99px; }
    .topic-item {
      padding: 9px 12px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      border-left: 4px solid;
      line-height: 1.3;
    }
    .topic-item:hover { background: rgba(216,203,180,0.2); }
    .topic-item.selected {
      background: rgba(176,138,83,0.09);
      border-color: rgba(176,138,83,0.3);
    }
    /* hide unused sub-elements */
    .topic-item-meta, .topic-item-badge { display: none; }
    .topic-item-title { font-size: 0.82rem; font-weight: 600; line-height: 1.3; }
    .sidebar-bottom {
      flex-shrink: 0;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
    }
    .sidebar-bottom-btns {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 10px;
    }
    .sidebar-bottom-text {
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .tool-btn {
      border-radius: 8px;
      border: 1px solid var(--border); padding: 9px 0;
      background: var(--surface); color: var(--text);
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s; text-align: center;
    }
    .tool-btn:hover { background: rgba(216,203,180,0.22); }
    .main-panel {
      flex: 1; display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden; gap: 0;
    }
    .panel-section { padding: 16px 16px 0; flex-shrink: 0; }
    .panel-section:last-child { padding-bottom: 24px; }
    .panel-section-topics {
      background: var(--surface-muted);
      padding: 24px 16px 16px;
      overflow: auto;
    }
    .panel-section-topics .section-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .topics-title-area {
      padding: 0 0 16px 0;
    }
    .topics-title-large {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .topics-title-small {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
      height: 100%;
    }
    .section-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(217,209,197,0.6);
      flex-shrink: 0;
    }
    .section-title { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.02em; }
    .section-subtitle {
      color: var(--text-muted); font-size: 0.76rem;
      line-height: 1.5; margin-top: 4px;
    }
    /* ── Timeline header hero area ── */
    .timeline-hero {
      padding: 24px 28px 16px;
      flex-shrink: 0;
    }
    .timeline-hero-eyebrow {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 8px;
    }
    .timeline-hero-title {
      font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em;
      color: var(--text); line-height: 1.1; margin-bottom: 10px;
    }
    .timeline-hero-desc {
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
      max-width: 620px;
    }
    /* ── Timeline grid ── */
    .timeline-scroll { 
      overflow: auto; 
      position: relative;
      max-height: calc(100vh - 280px);
    }
    .timeline-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(44,42,41,0.15); border-radius: 99px; }
    .timeline-inner { 
      position: relative; 
      display: inline-block;
    }
    .timeline-month-row {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 10;
    }
    .month-label-cell {
      padding: 5px 6px; font-size: 0.7rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      border-right: 1px solid var(--border);
      text-transform: uppercase;
    }
    .month-corner {
      width: 240px; min-width: 240px; border-right: 1px solid var(--border);
      position: sticky; left: 0; z-index: 15; background: var(--surface);
    }
    .timeline-header-row {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 9;
    }
    .timeline-corner {
      width: 240px; min-width: 240px;
      padding: 6px 14px; font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.05em;
      border-right: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      position: sticky; left: 0; z-index: 14; background: var(--surface);
    }
    .timeline-corner::after {
      content: '· 可拖动排序';
      font-weight: 400; font-size: 0.66rem; color: var(--muted-2);
    }
    .day-cell {
      width: 58px; min-width: 58px; min-height: 44px;
      border-right: 1px solid rgba(217,209,197,0.7);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3px 2px; font-size: 0.68rem;
      color: var(--text-muted); gap: 1px;
    }
    .day-month-label { font-size: 0.6rem; color: var(--accent); font-weight: 700; line-height: 1; }
    .day-date { font-size: 0.88rem; font-weight: 700; color: var(--text); line-height: 1; }
    .day-week { font-size: 0.58rem; color: var(--text-muted); line-height: 1; }
    .day-today-label { font-size: 0.56rem; color: var(--accent); font-weight: 700; line-height: 1; }
    .day-cell.today { background: rgba(176,138,83,0.1); }
    .day-cell.weekend { background: rgba(247,241,226,0.55); }
    .timeline-row {
      display: flex;
      border-bottom: 1px solid rgba(217,209,197,0.6);
      min-height: 90px;
    }
    .topic-label {
      width: 240px; min-width: 240px;
      padding: 0 8px 0 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: row; align-items: center; gap: 0;
      cursor: grab;
      transition: filter 0.15s, outline 0.15s;
      user-select: none; -webkit-user-select: none;
      position: sticky; left: 0; z-index: 8;
      background: var(--surface-muted);
    }
    .topic-label:hover { filter: brightness(0.97); }
    .topic-label.selected { outline: 2px solid rgba(176,138,83,0.45); outline-offset: -2px; }
    .topic-label.dragging { opacity: 0.5; }
    .topic-label-card {
      flex: 1; min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      margin: 8px 8px 8px 6px;
      padding: 7px 9px;
      display: flex; flex-direction: column; gap: 3px;
      box-shadow: 0 1px 4px rgba(44,42,41,0.05);
    }
    .topic-label-arrow {
      flex-shrink: 0; opacity: 0.55;
      height: 24px; width: auto;
      margin-right: 2px;
    }
    .topic-label:hover .topic-label-card { box-shadow: 0 3px 10px rgba(44,42,41,0.08); }
    .topic-label.selected .topic-label-card { outline: 2px solid rgba(176,138,83,0.4); }
    .topic-label-name {
      font-size: 0.8rem; font-weight: 700; line-height: 1.3;
      color: var(--text); white-space: normal; word-break: break-word;
      cursor: text;
    }
    .topic-label-name:hover { opacity: 0.7; }
    .topic-label-meta {
      display: flex; flex-direction: row; align-items: center; gap: 3px;
      flex-shrink: 0; font-size: 0.62rem; color: var(--text-muted);
      white-space: nowrap;
    }
    .topic-label-icon { display: none; }
    .topic-label-date { font-size: 0.62rem; color: var(--text-muted); }
    .topic-label-progress { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); }
    .track-area {
      position: relative;
      display: flex;
      flex: 1;
    }
    .track-cell {
      width: 58px; min-width: 58px;
      border-right: 1px solid rgba(217,209,197,0.45);
      cursor: pointer; transition: background 0.12s;
    }
    .track-cell:hover { background: rgba(176,138,83,0.06); }
    .track-cell.drop-target { background: rgba(176,138,83,0.18); }
    .track-cell.today { background: rgba(176,138,83,0.04); }
    .track-cell.weekend { background: rgba(247,241,226,0.45); }
    /* ── Task blocks ── */
    .task-block {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      min-height: 24px; height: auto;
      border-radius: 5px; padding: 4px 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 600; color: var(--text);
      cursor: grab; overflow: visible;
      box-shadow: 0 2px 6px rgba(44,42,41,0.07);
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      z-index: 2; user-select: none; -webkit-user-select: none;
      border: 1px solid transparent;
      text-align: center;
    }
    .task-block:hover { filter: brightness(0.94); box-shadow: 0 4px 12px rgba(44,42,41,0.12); z-index: 3; }
    .task-block.completed { opacity: 0.45; text-decoration: line-through; }
    .task-block-name {
      line-height: 1.4;
      white-space: normal;
      word-break: break-all;
      text-align: center;
      width: 100%;
    }
    .task-block-date { display: none; }
    .task-block.stage-prep, .task-block.stage-research { background: #DDD0BA; border-color: rgba(176,138,83,0.25); }
    .task-block.stage-script { background: #E8C8C2; border-color: rgba(164,106,88,0.25); color: #5C3028; }
    .task-block.stage-a_roll { background: #D4D8C4; border-color: rgba(139,155,122,0.25); }
    .task-block.stage-b_roll { background: #C8D2D8; border-color: rgba(124,142,153,0.25); }
    .task-block.stage-edit { background: #E8D8B0; border-color: rgba(198,162,92,0.3); }
    .task-block.stage-package { background: #DDD6CE; border-color: rgba(176,138,83,0.2); }
    .task-block.stage-cover { background: #E4DDD6; border-color: rgba(176,138,83,0.2); }
    .task-block.stage-copy { background: #E8D4D4; border-color: rgba(164,106,88,0.2); }
    .task-block.stage-publish { background: #C8A0A4; border-color: rgba(164,106,88,0.35); color: #fff; }
    .task-block.stage-brief { background: #D8C0A0; border-color: rgba(200,160,128,0.3); }
    .task-block.stage-outline { background: #C8B090; border-color: rgba(184,152,112,0.3); }
    .task-block.stage-review { background: #D0C0D8; border-color: rgba(155,138,165,0.35); }
    .task-block.stage-custom { background: #D4C8DC; border-color: rgba(155,138,165,0.3); }
    /* 右键菜单 */
    .ctx-menu {
      position: fixed; z-index: 300;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px;
      box-shadow: 0 8px 24px rgba(44,42,41,0.14);
      min-width: 160px;
    }
    .ctx-item {
      padding: 8px 12px; border-radius: 6px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(176,138,83,0.1); }
    .ctx-item.danger { color: var(--red); }
    .ctx-item.danger:hover { background: rgba(164,106,88,0.08); }
    .ctx-separator { height: 1px; background: var(--border); margin: 4px 0; }
    .add-topic-bar {
      padding: 10px 14px; background: var(--surface-muted);
      border-top: 1px solid var(--border);
    }
    .add-topic-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--text); color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .add-topic-btn:hover { background: #1E1C1B; }
    /* Topic Cards */
    .cards-wrap { padding: 12px; }
    .cards-grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .topic-card {
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); padding: 16px;
      display: flex; flex-direction: column; gap: 0;
      box-shadow: var(--shadow);
      transition: outline 0.15s;
    }
    .topic-card.selected { outline: 2px solid rgba(176,138,83,0.35); }
    .topic-card.drag-over { outline: 2px dashed rgba(176,138,83,0.5); }

    /* Section 1 — 标题 + 进度 */
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .card-head-left { flex: 1; min-width: 0; }
    .card-title { font-size: 0.92rem; font-weight: 800; letter-spacing: -0.02em; }
    .card-type-select {
      margin-top: 5px; padding: 3px 7px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.72rem; font-weight: 600;
      background: var(--surface-muted); color: var(--text);
      cursor: pointer;
    }
    .card-progress-wrap { min-width: 64px; text-align: right; }
    .card-progress-pct { font-size: 1rem; font-weight: 800; color: var(--text); }
    .card-progress-label { font-size: 0.62rem; color: var(--text-muted); }
    .card-progress-bar {
      width: 100%; height: 5px; border-radius: 99px;
      background: rgba(217,209,197,0.4); overflow: hidden; margin-bottom: 14px;
    }
    .card-progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #B08A53, #8B9B7A);
      transition: width 0.3s ease;
    }

    /* Section dividers */
    .card-section {
      border-top: 1px solid rgba(217,209,197,0.6);
      padding-top: 12px;
      margin-top: 4px;
    }
    .card-section-title {
      font-size: 0.66rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    /* Section 2 — 前置准备 */
    .prep-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .prep-input {
      flex: 1; padding: 6px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-muted);
      font-size: 0.76rem;
    }
    .prep-add-btn {
      width: 30px; height: 30px; border-radius: 6px;
      border: none; background: var(--text); color: #fff;
      font-weight: 700; cursor: pointer; font-size: 0.9rem;
    }
    .prep-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 6px;
      border: 1px solid rgba(217,209,197,0.7);
      background: var(--surface-muted); margin-bottom: 3px;
      transition: background 0.15s;
    }
    .prep-item.done { background: rgba(139,155,122,0.08); }
    .prep-item.done .item-text { text-decoration: line-through; color: var(--text-muted); }

    /* Section 3 — 制作流程 两列 */
    .workflow-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 10px;
    }
    .workflow-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; border-radius: 6px;
      border: 1px solid rgba(217,209,197,0.6);
      background: var(--surface-muted);
      transition: background 0.15s;
    }
    .workflow-item.done {
      background: rgba(139,155,122,0.08);
    }
    .workflow-item.done .item-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .item-checkbox { width: 13px; height: 13px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .item-text { flex: 1; font-size: 0.74rem; line-height: 1.3; min-width: 0; }
    .item-date { font-size: 0.62rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .item-remove {
      border: none; background: transparent; color: var(--muted-2);
      cursor: pointer; font-size: 0.76rem; padding: 1px 3px; flex-shrink: 0;
    }
    .workflow-dot { width: 6px; height: 6px; border-radius: 99px; flex-shrink: 0; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(44,42,41,0.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: var(--surface); border-radius: 12px;
      padding: 20px; width: 320px; max-width: 90vw;
      box-shadow: 0 24px 48px rgba(44,42,41,0.15);
    }
    .modal-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 12px; }
    .modal-field { margin-bottom: 10px; }
    .modal-field label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .modal-field input, .modal-field select {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid var(--border); font-size: 0.82rem;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .modal-btn {
      flex: 1; padding: 8px; border-radius: 6px; border: none;
      font-weight: 700; font-size: 0.82rem; cursor: pointer;
    }
    .modal-btn-primary { background: var(--text); color: #fff; }
    .modal-btn-cancel { background: var(--surface-muted); color: var(--text); border: 1px solid var(--border); }
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff; padding: 8px 16px;
      border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
    }
    #toast.show { opacity: 1; }
    @media (max-width: 1100px) { .cards-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .app-shell { flex-direction: column; }
      .sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; position: relative; }
      .sidebar-top { flex: 1; }
      .nav-list { flex-direction: row; padding: 8px; }
      .topic-list { display: none; }
      .sidebar-divider { display: none; }
      .sidebar-section-label { display: none; }
      .sidebar-bottom { border-top: none; border-left: 1px solid var(--border); display: flex; align-items: center; }
      .sidebar-bottom-btns { margin-bottom: 0; }
      .sidebar-bottom-text { display: none; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-panel">

        <div class="section-card">
          <div class="topics-title-area">

            <div class="topics-title-small">前置准备可以自由增加、勾选和删除。正式流程保持统一，避免每条内容出现一套不同的复杂清单。</div>

  <div class="modal-overlay" id="modal-overlay">

  <!-- 右键菜单 -->
  <div id="ctx-menu" class="ctx-menu" style="display:none"></div>

  <!-- 新增日程弹窗 -->
  <div class="modal-overlay" id="schedule-modal-overlay">
    <div class="modal-box">

        <button class="modal-btn modal-btn-primary" id="schedule-modal-confirm">确认添加</button>
      </div>
    </div>
  </div>

  <!-- 重命名弹窗 -->
  <div class="modal-overlay" id="rename-modal-overlay">
    <div class="modal-box">
      <div class="modal-title">重命名选题</div>
      <div class="modal-field">
        <label>选题名称</label>
        <input type="text" id="rename-modal-input" placeholder="新名称" />
