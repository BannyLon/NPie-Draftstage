<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - Neon Cyber 风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@700&family=Satoshi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satoshi', sans-serif;
            overflow: hidden;
            background: #0a0f1c;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #0a0f1c;
        }

        /* 网格背景 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        /* 扫描线效果 */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 204, 0.03),
                rgba(0, 255, 204, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 8;
        }

        /* 发光粒子 */
        .glow-particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.2;
        }

        .glow-1 {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 10%;
            background: #00ffcc;
            animation: float 8s infinite ease-in-out;
        }

        .glow-2 {
            width: 150px;
            height: 150px;
            bottom: 15%;
            right: 15%;
            background: #ff00aa;
            animation: float 10s infinite ease-in-out reverse;
        }

        /* 内容容器 */
        .content {
            z-index: 5;
            text-align: center;
            max-width: 85%;
        }

        /* 顶部标签 */
        .tag {
            display: inline-block;
            font-size: clamp(0.65rem, 1.5vh, 0.9rem);
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: clamp(0.4rem, 1vh, 0.6rem) clamp(0.8rem, 2vw, 1.2rem);
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: clamp(1rem, 3vh, 2rem);
            animation: glitch 3s ease-in-out infinite;
        }

        /* 主标题 */
        .main-title {
            font-family: 'Clash Display', sans-serif;
            font-size: clamp(2.2rem, 7vw, 4rem);
            color: #00ffcc;
            font-weight: 700;
            margin-bottom: clamp(0.5rem, 2vh, 1.5rem);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5), 
                         0 0 40px rgba(0, 255, 204, 0.3);
            letter-spacing: -1px;
            animation: fadeInScale 1s ease-out;
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(1rem, 2.5vh, 1.5rem);
            color: #ff00aa;
            font-weight: 700;
            margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.3);
            animation: fadeInScale 1s ease-out 0.2s both;
        }

        /* 描述 */
        .description {
            font-size: clamp(0.8rem, 1.8vh, 1.1rem);
            color: #ffffff;
            line-height: 1.6;
            opacity: 0.9;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        /* 动画 */
        @keyframes glitch {
            0%, 100% { 
                box-shadow: -2px 0 #ff00aa, 2px 0 #00ffcc;
                transform: translate(0);
            }
            20% { 
                box-shadow: -2px 0 #ff00aa, 2px 0 #00ffcc;
                transform: translate(-2px, 2px);
            }
            40% { 
                box-shadow: -2px 0 #ff00aa, 2px 0 #00ffcc;
                transform: translate(2px, -2px);
            }
            60% { 
                box-shadow: 2px 0 #00ffcc, -2px 0 #ff00aa;
                transform: translate(-2px, -2px);
            }
            80% { 
                box-shadow: 2px 0 #00ffcc, -2px 0 #ff00aa;
                transform: translate(2px, 2px);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 页码 */
        .page-number {
            position: absolute;
            top: clamp(1rem, 3vh, 2rem);
            right: clamp(1.5rem, 4vw, 2.5rem);
            font-size: clamp(0.8rem, 2vh, 1.2rem);
            color: #00ffcc;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            z-index: 10;
        }

        @media (max-height: 700px) {
            .tag { margin-bottom: 0.5rem; }
            .main-title { margin-bottom: 0.3rem; }
            .subtitle { margin-bottom: 0.3rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="grid-bg"></div>
        <div class="scanlines"></div>
        <div class="glow-particle glow-1"></div>
        <div class="glow-particle glow-2"></div>

        <div class="page-number">02</div>

        <div class="content">
            <div class="tag">赛博朋克风格</div>
            <h1 class="main-title">CLAUDE CODE</h1>
            <h2 class="subtitle">Harness Engineering</h2>
            <p class="description">深海蓝 × 青色 × 品红的未来科技感<br>为 AI 的秩序装上外骨骼</p>
        </div>
    </div>
</body>
</html>
